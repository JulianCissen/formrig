@if (loading()) {
  <div role="status" aria-label="Loading form…" class="form-loading">
    <mat-progress-spinner mode="indeterminate" diameter="40" />
  </div>
} @else if (error()) {
  <p role="alert" class="form-error">{{ error() }}</p>
} @else {
  @let form = formDef()!;
  <form class="form-body">
    @for (field of form.fields; track field.id) {
      <mat-form-field appearance="outline" subscriptSizing="dynamic" class="form-field">
        <mat-label>{{ field.label }}</mat-label>
        <input matInput
               id="field-{{ field.id }}"
               [value]="field.value ?? ''"
               [required]="field.required"
               [attr.disabled]="field.disabled || null" />
      </mat-form-field>
    }
    <div class="form-actions">
      <button matButton="tonal" type="button">Submit</button>
    </div>
  </form>
}
