@if (displayMode()) {
  <app-field-display-value
    [fieldId]="field().id"
    [label]="field().label"
    [value]="displayValue()"
    [displayType]="'text'" />
} @else {
<app-field-plain-wrapper
  [fieldId]="field().id"
  [label]="field().label"
  [hint]="field().hint"
  [info]="field().info"
  [dirtyFieldIds]="dirtyFieldIds"
  [validationState]="validationState">
  <mat-radio-group [formControlName]="field().id"
                   [attr.aria-label]="field().label"
                   [attr.aria-describedby]="field().hint ? field().id + '-hint' : null">
    @for (opt of field().options; track opt) {
      <mat-radio-button [value]="opt" (blur)="onBlur(field().id)">{{ opt }}</mat-radio-button>
    }
  </mat-radio-group>
</app-field-plain-wrapper>
}
