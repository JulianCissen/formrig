<!-- Skip link: first focusable element in the DOM -->
<a class="skip-link" href="#main-content">Skip to main content</a>

<!-- Toolbar: sticky frosted-glass brand bar -->
<mat-toolbar class="app-toolbar" role="banner">
  <span class="app-wordmark">FormRig</span>
  <span class="toolbar-spacer"></span>
  <button mat-icon-button aria-label="Account">
    <mat-icon>account_circle</mat-icon>
  </button>
</mat-toolbar>

<!-- Navigation rail (tablet / desktop ≥ 600px) -->
<mat-sidenav-container class="app-sidenav-container">
  <mat-sidenav
    class="app-nav-rail"
    mode="side"
    [opened]="!isMobile()"
    [disableClose]="true">
    <nav aria-label="Main navigation" class="nav-rail-list">
      @for (item of navItems; track item.route) {
        <a
          class="nav-rail-item"
          [routerLink]="item.route"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: item.exact }"
          [attr.aria-current]="null">
          <span class="nav-rail-icon-wrap">
            <mat-icon>{{ item.icon }}</mat-icon>
          </span>
          <span class="nav-rail-label">{{ item.label }}</span>
        </a>
      }
    </nav>
  </mat-sidenav>

  <!-- Main content area -->
  <mat-sidenav-content class="app-content">
    <!-- Route animation host -->
    <div
      class="route-transition-host"
      [@routeAnimations]="routeAnimationId()">
      <router-outlet />
    </div>

    <!-- Mobile bottom nav rendered inside content area so it scrolls with safe area -->
    <app-bottom-nav />
  </mat-sidenav-content>
</mat-sidenav-container>
