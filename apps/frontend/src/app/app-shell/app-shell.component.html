<!-- Skip link: first focusable element in the DOM -->
<a class="skip-link" href="#main-content">Skip to main content</a>

<!-- Toolbar: sticky M3 surface app bar -->
<mat-toolbar class="app-toolbar" role="banner">
  <span class="app-wordmark">FormRig</span>
  <span class="toolbar-spacer"></span>
  @if (devUserSwitcher) {
    <ng-container *ngComponentOutlet="devUserSwitcher" />
  }
  <button
    matIconButton
    (click)="theme.toggle()"
    [attr.aria-label]="theme.isDark() ? 'Switch to light mode' : 'Switch to dark mode'">
    <mat-icon>{{ theme.isDark() ? 'light_mode' : 'dark_mode' }}</mat-icon>
  </button>
  <button matIconButton aria-label="Account">
    <mat-icon>account_circle</mat-icon>
  </button>
</mat-toolbar>

<!-- Navigation rail (tablet / desktop ≥ 600px) -->
<mat-sidenav-container class="app-sidenav-container">
  <mat-sidenav
    class="app-nav-rail"
    mode="side"
    [opened]="!isMobile()"
    [disableClose]="true">
    <div class="nav-logo-wrap" aria-hidden="true">
      <span class="nav-logo">F</span>
    </div>
    <nav aria-label="Main navigation" class="nav-rail-list">
      @for (item of navItems; track item.route) {
        <app-nav-rail-item
          [icon]="item.icon"
          [label]="item.label"
          [route]="item.route"
          [exact]="item.exact"
        />
      }
    </nav>
    @if (devUserSwitcher) {
      <mat-divider class="dev-switcher-divider" />
      <div class="dev-switcher-rail">
        <ng-container *ngComponentOutlet="devUserSwitcher" />
      </div>
    }
  </mat-sidenav>

  <!-- Main content area -->
  <mat-sidenav-content class="app-content">
    <!-- Route animation host -->
    <div
      class="route-transition-host"
      [@routeAnimations]="routeAnimationId()">
      <router-outlet />
    </div>

    <!-- Mobile bottom nav rendered inside content area so it scrolls with safe area -->
    <app-bottom-nav />
  </mat-sidenav-content>
</mat-sidenav-container>
